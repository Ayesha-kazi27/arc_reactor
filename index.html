<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Arc Reactor Energy Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">

<a class="navbar-brand" href="#">Arc Reactor</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#propulsion">Propulsion</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#defense">Defense</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#navigation">Navigation</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#communication">Communication</a>
</li>

</ul>
</div>

</div>
</nav>
<div class="container text-center section" style="margin-top:80px">
<h1>Arc Reactor Energy Panel</h1>
<div class="mt-4">
<p>Total Energy: <span id="totalEnergy">100</span></p>
<p>Remaining Energy: <span id="remainingEnergy">100</span></p>
</div>
</div>
<section id="propulsion" class="section container">
<h2>Propulsion</h2>
<input id="propulsionInput" type="number" value="0" class="form-control w-25 mb-3">
<p>Efficiency: <span id="propulsionEff">0%</span></p>
<div class="progress">
<div id="propulsionBar" class="progress-bar bg-info" style="width:0%"></div>
</div>
</section>

<section id="defense" class="section container">
<h2>Defense</h2>
<input id="defenseInput" type="number" value="0" class="form-control w-25 mb-3">
<p>Efficiency: <span id="defenseEff">0%</span></p>
<div class="progress">
<div id="defenseBar" class="progress-bar bg-danger" style="width:0%"></div>
</div>

</section>
<section id="navigation" class="section container">

<h2>Navigation</h2>

<input id="navigationInput" type="number" value="0" class="form-control w-25 mb-3">

<p>Efficiency: <span id="navigationEff">0%</span></p>

<div class="progress">
<div id="navigationBar" class="progress-bar bg-success" style="width:0%"></div>
</div>

</section>

<section id="communication" class="section container">

<h2>Communication</h2>

<input id="communicationInput" type="number" value="0" class="form-control w-25 mb-3">

<p>Efficiency: <span id="communicationEff">0%</span></p>

<div class="progress">
<div id="communicationBar" class="progress-bar bg-warning" style="width:0%"></div>
</div>

</section>


<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
