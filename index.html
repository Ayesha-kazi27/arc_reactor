<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arc Reactor Energy Panel</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<body>
  
<div class="panel">
<h1>Arc Reactor Energy Panel</h1>

<div class="energy">
<div>Total Energy: <span id="totalEnergy">100</span></div>
<div>Remaining Energy: <span id="remainingEnergy">100</span></div>
</div>
<div class="subsystems">

<div class="subsystem">
<h3>Propulsion</h3>

<div class="controls">
<input id="propulsionInput" type="number" value="0">

</div>

<p>Efficiency: <span id="propulsionEff">0%</span></p>
<div class="progress">
<div id="propulsionBar" class="bar"></div>
</div>
</div>

<div class="subsystem">
<h3>Defense</h3>

<div class="controls">
<input id="defenseInput" type="number" value="0">
</div>

<p>Efficiency: <span id="defenseEff">0%</span></p>
<div class="progress">
<div id="defenseBar" class="bar"></div>
</div>
</div>

<div class="subsystem">
<h3>Navigation</h3>

<div class="controls">
<input id="navigationInput" type="number" value="0">
</div>

<p>Efficiency: <span id="navigationEff">0%</span></p>

<div class="progress">
<div id="navigationBar" class="bar"></div>
</div>

</div>

<div class="subsystem">
<h3>Communication</h3>

<div class="controls">
<input id="communicationInput" type="number" value="0">
</div>

<p>Efficiency: <span id="communicationEff">0%</span></p>

<div class="progress">
<div id="communicationBar" class="bar"></div>
</div>
</div>
</div>
<div id="error"></div>
</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
